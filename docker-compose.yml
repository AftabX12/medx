services:
  postgres:
    image: postgres:16-alpine
    container_name: medx-postgres
    environment:
      POSTGRES_USER: medx
      POSTGRES_PASSWORD: medx
      POSTGRES_DB: medx
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medx -d medx"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: medx-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # DATABASE_URL here overrides whatever is in .env so the app always
    # connects to the postgres container, not the local SQLite default.
    environment:
      DATABASE_URL: postgresql+asyncpg://medx:medx@postgres:5432/medx
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 15s

volumes:
  postgres-data:
  uploads:
