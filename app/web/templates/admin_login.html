{% extends "base.html" %}
{% block title %}Admin Login · MedX{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-120px)] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-slate-200 dark:border-gray-800 p-8">

      <div class="mb-7">
        <div class="mb-4 inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-50 dark:bg-indigo-950 text-indigo-700 dark:text-indigo-300 text-xs font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Admin Console
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome back</h1>
        <p class="text-sm text-slate-500 dark:text-gray-400 mt-1">Sign in to your admin account</p>
      </div>

      {% if error %}
        <div class="mb-5 flex items-start gap-2.5 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-950/50 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
          <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Email address</label>
          <input name="email" type="email" required autofocus placeholder="admin@medx.io"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950 transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Password</label>
          <input name="password" type="password" required placeholder="••••••••"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950 transition-colors" />
        </div>
        <button type="submit"
                class="w-full mt-2 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm transition-colors">
          Sign in
        </button>
      </form>

      <p class="text-xs text-slate-400 dark:text-gray-500 mt-5 text-center">
        Clinician? <a href="/doctor/login" class="text-indigo-600 dark:text-indigo-400 hover:underline font-medium">Log in here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
