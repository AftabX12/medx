{% extends "base.html" %}
{% block title %}New Patient · MedX{% endblock %}
{% block content %}
<div class="mb-5 flex items-center gap-3">
  <a href="/patients/ui" class="text-sm text-slate-400 dark:text-gray-500 hover:text-slate-600 dark:hover:text-gray-300 transition-colors">← Patients</a>
</div>

<div class="max-w-2xl">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-slate-900 dark:text-white">New patient</h1>
    <p class="text-sm text-slate-500 dark:text-gray-400 mt-0.5">Create a new patient record</p>
  </div>

  {% if error %}
    <div class="mb-5 flex items-start gap-2.5 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-950/50 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
      <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ error }}
    </div>
  {% endif %}

  <form method="post" action="/patients/ui" class="space-y-4">

    <section class="bg-white dark:bg-gray-900 rounded-2xl border border-slate-200 dark:border-gray-800 p-5 space-y-4">
      <h2 class="text-sm font-semibold text-slate-700 dark:text-gray-200">Identity</h2>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">MRN <span class="text-red-500">*</span></label>
        <input name="mrn" required placeholder="e.g. MRN-00123"
               class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Given name <span class="text-red-500">*</span></label>
          <input name="given_name" required placeholder="Jane"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Family name <span class="text-red-500">*</span></label>
          <input name="family_name" required placeholder="Smith"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Date of birth</label>
          <input name="date_of_birth" type="date"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Sex</label>
          <select name="sex"
                  class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors">
            <option value="">—</option>
            <option value="F">Female</option>
            <option value="M">Male</option>
            <option value="X">Other</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Blood type</label>
          <select name="blood_type"
                  class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors">
            <option value="">—</option>
            {% for bt in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option value="{{ bt }}">{{ bt }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </section>

    <section class="bg-white dark:bg-gray-900 rounded-2xl border border-slate-200 dark:border-gray-800 p-5 space-y-4">
      <h2 class="text-sm font-semibold text-slate-700 dark:text-gray-200">Contact <span class="font-normal text-slate-400 dark:text-gray-500">(optional)</span></h2>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Phone</label>
          <input name="phone" placeholder="+1 555 000 0000"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Email</label>
          <input name="email" type="email" placeholder="patient@email.com"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Address</label>
        <input name="address_line1" placeholder="Street address"
               class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors mb-2" />
        <div class="grid grid-cols-3 gap-2">
          <input name="city" placeholder="City"
                 class="rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
          <input name="state" placeholder="State"
                 class="rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
          <input name="zip_code" placeholder="ZIP"
                 class="rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
      </div>
    </section>

    <section class="bg-white dark:bg-gray-900 rounded-2xl border border-slate-200 dark:border-gray-800 p-5 space-y-4">
      <h2 class="text-sm font-semibold text-slate-700 dark:text-gray-200">Clinical <span class="font-normal text-slate-400 dark:text-gray-500">(optional)</span></h2>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Chief complaint / Reason for visit</label>
        <textarea name="chief_complaint" rows="2"
                  class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors resize-none"></textarea>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-gray-400 mb-1.5">Primary physician</label>
        <input name="primary_physician"
               class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
      </div>
    </section>

    <div class="flex items-center gap-3 pt-1">
      <button type="submit"
              class="px-5 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors">
        Create patient
      </button>
      <a href="/patients/ui" class="text-sm text-slate-500 dark:text-gray-400 hover:text-slate-700 dark:hover:text-gray-200 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
