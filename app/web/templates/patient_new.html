{% extends "base.html" %}
{% block title %}New patient · MedX{% endblock %}
{% block content %}
<div class="max-w-lg">
  <h1 class="text-xl font-semibold mb-4">New patient</h1>
  {% if error %}
    <div class="mb-3 px-3 py-2 rounded bg-red-50 border border-red-200 text-red-800 text-sm">{{ error }}</div>
  {% endif %}
  <form method="post" action="/patients/ui" class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 space-y-3">
    <div>
      <label class="block text-sm text-slate-600 mb-1">MRN <span class="text-red-500">*</span></label>
      <input name="mrn" required class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Given name <span class="text-red-500">*</span></label>
        <input name="given_name" required class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Family name <span class="text-red-500">*</span></label>
        <input name="family_name" required class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Sex</label>
        <select name="sex" class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
          <option value="">—</option>
          <option value="F">F</option>
          <option value="M">M</option>
          <option value="X">X</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Date of birth</label>
        <input name="date_of_birth" type="date" class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      </div>
    </div>
    <div class="flex gap-2 pt-2">
      <button type="submit" class="bg-slate-900 text-white rounded px-4 py-2 text-sm font-medium hover:bg-slate-800">Create</button>
      <a href="/patients/ui" class="text-slate-600 px-4 py-2 text-sm hover:text-slate-900">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
