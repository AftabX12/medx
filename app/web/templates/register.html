{% extends "base.html" %}
{% block title %}Register · MedX{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-120px)] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-slate-200 dark:border-gray-800 p-8">
      <div class="mb-7">
        <div class="mb-4 inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-emerald-50 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300 text-xs font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          New Practice
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Register your practice</h1>
        <p class="text-sm text-slate-500 dark:text-gray-400 mt-1">Create a new organisation and doctor account</p>
      </div>

      {% if error %}
        <div class="mb-5 flex items-start gap-2.5 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-950/50 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
          <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/register" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Organisation name</label>
          <input name="tenant_name" required placeholder="city-cardiology"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Full name</label>
          <input name="full_name" placeholder="Dr. Jane Smith"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Email address</label>
          <input name="email" type="email" required placeholder="doctor@clinic.com"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-1.5">Password</label>
          <input name="password" type="password" required minlength="8" placeholder="Min. 8 characters"
                 class="w-full rounded-xl border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-800 px-3.5 py-2.5 text-sm text-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950 transition-colors" />
        </div>
        <button type="submit" class="w-full mt-2 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm transition-colors">
          Create account
        </button>
      </form>

      <p class="text-xs text-slate-500 dark:text-gray-500 mt-5 text-center">
        Already have an account? <a href="/doctor/login" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
